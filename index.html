<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Alma Event Flow</title>

    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="shortcut icon" type="image/png" href="/favicon.png" />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Alma Event Flow" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Paint the themed background before the app mounts to avoid a white flash on reload -->
    <style>
      html, body { background-color: #f8f9fe; }
      html.ion-palette-dark, html.ion-palette-dark body { background-color: #0f0f23; }
    </style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t && t.indexOf('dark') !== -1) {
            document.documentElement.classList.add('ion-palette-dark');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>

</html>
